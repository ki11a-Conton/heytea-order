<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEYTEA 喜茶 — 点单</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ========================================
       CSS Variables — 严格遵循 DESIGN.md
       ======================================== */
    :root {
      /* 品牌色 */
      --heytea-green: #00A651;
      --heytea-green-rgb: 0, 166, 81;
      --heytea-green-light: #E8F8EF;
      --heytea-green-light-rgb: 232, 248, 239;
      --heytea-green-dark: #008C44;
      --heytea-green-dark-rgb: 0, 140, 68;

      /* 中性色 */
      --white: #FFFFFF;
      --white-rgb: 255, 255, 255;
      --gray-50: #FAFAFA;
      --gray-50-rgb: 250, 250, 250;
      --gray-100: #F5F5F5;
      --gray-100-rgb: 245, 245, 245;
      --gray-200: #EEEEEE;
      --gray-200-rgb: 238, 238, 238;
      --gray-300: #E0E0E0;
      --gray-300-rgb: 224, 224, 224;
      --gray-400: #BDBDBD;
      --gray-400-rgb: 189, 189, 189;
      --gray-500: #9E9E9E;
      --gray-500-rgb: 158, 158, 158;
      --gray-600: #757575;
      --gray-600-rgb: 117, 117, 117;
      --gray-700: #616161;
      --gray-700-rgb: 97, 97, 97;
      --gray-800: #424242;
      --gray-800-rgb: 66, 66, 66;
      --gray-900: #212121;
      --gray-900-rgb: 33, 33, 33;

      /* 功能色 */
      --red: #FF4D4F;
      --red-rgb: 255, 77, 79;
      --orange: #FF8C00;
      --orange-rgb: 255, 140, 0;
      --gold: #FFD700;
      --gold-rgb: 255, 215, 0;

      /* 语义色 */
      --bg-primary: var(--white);
      --bg-secondary: var(--gray-50);
      --bg-tertiary: var(--gray-100);
      --text-primary: var(--gray-900);
      --text-secondary: var(--gray-600);
      --text-tertiary: var(--gray-400);
      --border-color: var(--gray-200);
      --accent: var(--heytea-green);
      --accent-hover: var(--heytea-green-dark);
      --accent-bg: var(--heytea-green-light);

      /* 字体 */
      --font-primary: 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
      --font-number: 'DIN Alternate', 'NeutraText-DemiAlt', 'Helvetica Neue', sans-serif;

      /* 间距 */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 12px;
      --space-lg: 16px;
      --space-xl: 20px;
      --space-2xl: 24px;
      --space-3xl: 32px;

      /* 阴影 */
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.08);
      --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.12);
      --shadow-cart: 0 -2px 12px rgba(0, 0, 0, 0.1);
    }

    /* ========================================
       Reset & Base
       ======================================== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-primary);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.6;
      color: var(--text-primary);
      background: var(--bg-secondary);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      touch-action: manipulation;
    }

    img {
      display: block;
      max-width: 100%;
    }

    button {
      font-family: inherit;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* ========================================
       App Shell — 桌面端手机模拟器
       ======================================== */
    .app-shell {
      position: relative;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--bg-primary);
      overflow-x: hidden;
    }

    @media (min-width: 769px) {
      body {
        background: linear-gradient(135deg, #f0f4f0 0%, #e8ede8 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 40px 20px;
      }
      .app-shell {
        border-radius: 40px;
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(0, 0, 0, 0.05);
        height: 844px;
        max-height: 90vh;
        overflow-y: auto;
        overflow-x: hidden;
        position: relative;
      }
      .app-shell::before {
        content: '';
        position: sticky;
        top: 0;
        z-index: 999;
        display: block;
        height: 44px;
        background: var(--white);
        border-radius: 40px 40px 0 0;
        border-bottom: 1px solid var(--gray-200);
      }
      .app-shell::after {
        content: '';
        position: sticky;
        bottom: 0;
        z-index: 999;
        display: block;
        height: 34px;
        background: var(--white);
        border-radius: 0 0 40px 40px;
        border-top: 1px solid var(--gray-200);
      }
      .page-content {
        padding-top: 44px !important;
      }
    }

    /* ========================================
       Page System
       ======================================== */
    .page {
      display: none;
      min-height: 100vh;
      background: var(--bg-primary);
    }
    .page.active {
      display: block;
      animation: pageFadeIn 0.35s ease forwards;
    }

    @keyframes pageFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .page-content {
      padding-bottom: calc(56px + env(safe-area-inset-bottom, 20px));
    }

    /* ========================================
       Navbar
       ======================================== */
    .navbar {
      height: 52px;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 1px solid var(--border-color);
      padding: 0 var(--space-lg);
    }
    .navbar .title,
    .navbar h1 {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .navbar .back-btn {
      position: absolute;
      left: var(--space-md);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      cursor: pointer;
      border-radius: 50%;
      transition: background 0.15s ease;
      color: var(--text-primary);
    }
    .navbar .back-btn:hover {
      background: var(--bg-tertiary);
    }
    .navbar .back-btn svg {
      width: 20px;
      height: 20px;
    }

    /* ========================================
       HOME PAGE
       ======================================== */

    /* --- Banner Carousel --- */
    .banner-section {
      padding: var(--space-lg);
      padding-bottom: 0;
    }
    .banner-carousel {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 3 / 2;
      background: var(--bg-tertiary);
    }
    .banner-track {
      display: flex;
      width: 300%;
      height: 100%;
      transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .banner-slide {
      width: calc(100% / 3);
      height: 100%;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .banner-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .banner-slide .banner-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: var(--space-xl) var(--space-lg) var(--space-lg);
      background: linear-gradient(transparent, rgba(0,0,0,0.5));
      color: var(--white);
    }
    .banner-slide .banner-overlay h2 {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: var(--space-xs);
    }
    .banner-slide .banner-overlay p {
      font-size: 13px;
      opacity: 0.9;
    }
    .banner-dots {
      position: absolute;
      bottom: var(--space-md);
      right: var(--space-lg);
      display: flex;
      gap: 6px;
    }
    .banner-dot {
      width: 6px;
      height: 6px;
      border-radius: 3px;
      background: rgba(var(--white-rgb), 0.5);
      transition: width 0.3s ease, background 0.3s ease;
    }
    .banner-dot.active {
      width: 18px;
      background: var(--white);
    }

    /* --- Order Type Entry --- */
    .order-type-section {
      padding: var(--space-xl) var(--space-lg);
    }
    .order-type-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-md);
    }
    .order-type-card {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: var(--space-lg) var(--space-md);
      text-align: center;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      border: none;
      width: 100%;
    }
    .order-type-card:hover {
      background: var(--accent-bg);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .order-type-card:active {
      transform: translateY(0);
    }
    .order-type-card .icon {
      width: 40px;
      height: 40px;
      margin: 0 auto var(--space-sm);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .order-type-card .icon svg {
      width: 32px;
      height: 32px;
      color: var(--heytea-green);
    }
    .order-type-card .label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .order-type-card .sublabel {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* --- Section Header --- */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-lg);
      margin-bottom: var(--space-md);
    }
    .section-header h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      text-wrap: balance;
    }
    .section-header .more {
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 2px;
      transition: color 0.15s ease;
    }
    .section-header .more:hover {
      color: var(--accent);
    }
    .section-header .more svg {
      width: 14px;
      height: 14px;
    }

    /* --- Hot Products Horizontal Scroll --- */
    .hot-products-section {
      margin-bottom: var(--space-xl);
    }
    .hot-products-scroll {
      display: flex;
      gap: var(--space-md);
      overflow-x: auto;
      scrollbar-width: none;
      padding: 0 var(--space-lg);
      scroll-snap-type: x mandatory;
    }
    .hot-products-scroll::-webkit-scrollbar { display: none; }
    .hot-product-card {
      flex-shrink: 0;
      width: 140px;
      scroll-snap-align: start;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .hot-product-card:hover {
      transform: translateY(-2px);
    }
    .hot-product-card .img-wrap {
      width: 140px;
      height: 140px;
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg-tertiary);
      margin-bottom: var(--space-sm);
    }
    .hot-product-card .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }
    .hot-product-card:hover .img-wrap img {
      transform: scale(1.05);
    }
    .hot-product-card .name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .hot-product-card .price {
      font-family: var(--font-number);
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }
    .hot-product-card .price .yen {
      font-size: 11px;
      font-weight: 600;
    }

    /* --- Promo Banners --- */
    .promo-section {
      padding: 0 var(--space-lg);
      margin-bottom: var(--space-xl);
    }
    .promo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-md);
    }
    .promo-card {
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      aspect-ratio: 4 / 3;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .promo-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }
    .promo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .promo-card .promo-text {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: var(--space-md);
      background: linear-gradient(transparent, rgba(0,0,0,0.4));
      color: var(--white);
      font-size: 13px;
      font-weight: 600;
    }

    /* --- New Arrivals Grid --- */
    .new-arrivals-section {
      padding: 0 var(--space-lg);
      margin-bottom: var(--space-xl);
    }
    .new-arrivals-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-md);
    }

    /* ========================================
       ORDER PAGE
       ======================================== */

    /* --- Category Nav --- */
    .category-nav {
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      background: var(--white);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 52px;
      z-index: 10;
    }
    .category-nav::-webkit-scrollbar { display: none; }
    .category-tab {
      flex-shrink: 0;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 400;
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
      position: relative;
      transition: color 0.2s ease;
      white-space: nowrap;
      font-family: var(--font-primary);
    }
    .category-tab:hover {
      color: var(--text-primary);
    }
    .category-tab:focus-visible {
      outline: 2px solid var(--heytea-green);
      outline-offset: -2px;
    }
    .category-tab.active {
      color: var(--heytea-green);
      font-weight: 600;
    }
    .category-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 3px;
      background: var(--heytea-green);
      border-radius: 2px;
    }

    /* --- Product Grid --- */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-md);
      padding: var(--space-lg);
    }

    /* --- Product Card --- */
    .product-card {
      background: var(--white);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: var(--shadow-sm);
    }
    .product-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }
    .product-card:active {
      transform: translateY(0);
    }
    .product-card .image-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      background: var(--bg-tertiary);
    }
    .product-card .image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }
    .product-card:hover .image-wrap img {
      transform: scale(1.05);
    }
    .product-card .tags {
      position: absolute;
      top: var(--space-sm);
      left: var(--space-sm);
      display: flex;
      gap: 4px;
    }
    .product-card .info {
      padding: 10px var(--space-md) var(--space-md);
    }
    .product-card .name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: var(--space-xs);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .product-card .desc {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.4;
      margin-bottom: var(--space-sm);
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .product-card .price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .product-card .price {
      font-family: var(--font-number);
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }
    .product-card .price .yen {
      font-size: 12px;
      font-weight: 600;
    }

    /* --- Tags --- */
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      line-height: 1.4;
    }
    .tag-hot {
      background: rgba(var(--red-rgb), 0.1);
      color: var(--red);
    }
    .tag-new {
      background: rgba(var(--heytea-green-rgb), 0.1);
      color: var(--heytea-green);
    }
    .tag-season {
      background: rgba(var(--orange-rgb), 0.1);
      color: var(--orange);
    }

    /* --- Buttons --- */
    .btn-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.15s ease;
      font-size: 16px;
      flex-shrink: 0;
    }
    .btn-icon.add {
      background: var(--heytea-green);
      color: var(--white);
    }
    .btn-icon.add:hover {
      background: var(--heytea-green-dark);
      transform: scale(1.1);
    }
    .btn-icon.minus {
      background: var(--gray-200);
      color: var(--gray-600);
    }
    .btn-icon.minus:hover {
      background: var(--gray-300);
    }
    .btn-icon svg {
      width: 16px;
      height: 16px;
    }
    .btn-icon:focus-visible {
      outline: 2px solid var(--heytea-green);
      outline-offset: 2px;
    }

    .btn-primary {
      background: var(--heytea-green);
      color: var(--white);
      border-radius: 24px;
      padding: 10px 28px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      font-family: var(--font-primary);
    }
    .btn-primary:hover {
      background: var(--heytea-green-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(var(--heytea-green-rgb), 0.3);
    }
    .btn-primary:active {
      transform: translateY(0);
      box-shadow: none;
    }
    .btn-primary:disabled {
      background: var(--gray-300);
      color: var(--gray-500);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .btn-primary:focus-visible {
      outline: 2px solid var(--heytea-green);
      outline-offset: 2px;
    }

    .btn-secondary {
      background: var(--gray-100);
      color: var(--gray-800);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 500;
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      font-family: var(--font-primary);
    }
    .btn-secondary:hover {
      background: var(--heytea-green-light);
      color: var(--heytea-green);
    }
    .btn-secondary.active {
      background: var(--heytea-green-light);
      color: var(--heytea-green);
      border-color: var(--heytea-green);
    }
    .btn-secondary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .btn-secondary:focus-visible {
      outline: 2px solid var(--heytea-green);
      outline-offset: 2px;
    }

    /* --- Quantity Control (inline) --- */
    .qty-control {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }
    .qty-num {
      font-family: var(--font-number);
      font-size: 14px;
      font-weight: 600;
      min-width: 20px;
      text-align: center;
      color: var(--text-primary);
    }

    /* ========================================
       Cart Bar
       ======================================== */
    .cart-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: 56px;
      background: var(--gray-900);
      display: flex;
      align-items: center;
      padding: 0 var(--space-lg);
      z-index: 160;
    box-shadow: var(--shadow-cart);
  }
    @media (min-width: 769px) {
      .cart-bar {
        border-radius: 0 0 40px 40px;
        max-width: 480px;
      }
    }
    .cart-bar .cart-icon-wrap {
      position: relative;
      width: 44px;
      height: 44px;
      background: var(--gray-700);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: -12px;
      border: 3px solid var(--gray-900);
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .cart-bar .cart-icon-wrap.has-items {
      background: var(--heytea-green);
    }
    .cart-bar .cart-icon-wrap svg {
      width: 22px;
      height: 22px;
      color: var(--white);
    }
    .cart-bar .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      min-width: 18px;
      height: 18px;
      background: var(--red);
      color: var(--white);
      font-size: 11px;
      font-weight: 600;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      font-family: var(--font-number);
      transition: transform 0.2s ease;
    }
    .cart-bar .total-price {
      flex: 1;
      margin-left: var(--space-md);
      color: var(--white);
      font-family: var(--font-number);
      font-size: 20px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .cart-bar .total-price .yen {
      font-size: 13px;
      font-weight: 600;
    }
    .cart-bar .cart-info {
      flex: 1;
      margin-left: var(--space-md);
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      text-align: left;
      font-family: var(--font-primary);
    }
    .cart-bar .cart-info:focus-visible {
      outline: 2px solid var(--white);
      outline-offset: -2px;
      border-radius: 4px;
    }
    .cart-bar .delivery-tip {
      font-size: 11px;
      color: var(--gray-500);
      margin-left: var(--space-xs);
    }
    .cart-bar .checkout-btn {
      background: var(--heytea-green);
      color: var(--white);
      border: none;
      border-radius: 20px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
      font-family: var(--font-primary);
      white-space: nowrap;
    }
    .cart-bar .checkout-btn:hover {
      background: var(--heytea-green-dark);
    }
    .cart-bar .checkout-btn:disabled {
      background: var(--gray-600);
      cursor: not-allowed;
    }
    .cart-bar .checkout-btn:focus-visible {
      outline: 2px solid var(--white);
      outline-offset: 2px;
    }

    /* ========================================
       Modal — Product Detail
       ======================================== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-sheet {
      background: var(--white);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 480px;
      max-height: 85vh;
      overflow-y: auto;
      overscroll-behavior: contain;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .modal-overlay.open .modal-sheet {
      transform: translateY(0);
    }
    .modal-handle {
      width: 36px;
      height: 4px;
      background: var(--gray-300);
      border-radius: 2px;
      margin: var(--space-md) auto 0;
    }
    .modal-product-img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: var(--bg-tertiary);
    }
    .modal-body {
      padding: var(--space-xl) var(--space-lg) var(--space-3xl);
    }
    .modal-product-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: var(--space-sm);
    }
    .modal-product-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: var(--space-lg);
    }
    .modal-price {
      font-family: var(--font-number);
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-xl);
      font-variant-numeric: tabular-nums;
    }
    .modal-price .yen {
      font-size: 14px;
      font-weight: 600;
    }

    /* Spec Options */
    .spec-group {
      margin-bottom: var(--space-xl);
    }
    .spec-group-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-md);
    }
    .spec-options {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
    }
    .spec-option {
      background: var(--bg-secondary);
      color: var(--gray-800);
      border-radius: 20px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 500;
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      font-family: var(--font-primary);
    }
    .spec-option:hover {
      background: var(--heytea-green-light);
      color: var(--heytea-green);
    }
    .spec-option.active {
      background: var(--heytea-green-light);
      color: var(--heytea-green);
      border-color: var(--heytea-green);
    }
    .spec-option:focus-visible {
      outline: 2px solid var(--heytea-green);
      outline-offset: 2px;
    }

    /* Modal Footer */
    .modal-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-lg);
      border-top: 1px solid var(--border-color);
      background: var(--white);
      position: sticky;
      bottom: 0;
    }
    .modal-footer .modal-total {
      font-family: var(--font-number);
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .modal-footer .modal-total .yen {
      font-size: 13px;
      font-weight: 600;
    }
    .modal-footer .add-to-cart-btn {
      background: var(--heytea-green);
      color: var(--white);
      border: none;
      border-radius: 24px;
      padding: 12px 36px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      font-family: var(--font-primary);
    }
    .modal-footer .add-to-cart-btn:hover {
      background: var(--heytea-green-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(var(--heytea-green-rgb), 0.3);
    }
    .modal-footer .add-to-cart-btn:active {
      transform: translateY(0);
    }

    /* ========================================
       Cart Drawer
       ======================================== */
    .cart-drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 150;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .cart-drawer-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    .cart-drawer {
      position: fixed;
      bottom: 56px;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%;
      max-width: 480px;
      max-height: 50vh;
      background: var(--white);
      border-radius: 20px 20px 0 0;
      z-index: 151;
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      overscroll-behavior: contain;
    }
    .cart-drawer.open {
      transform: translateX(-50%) translateY(0);
    }
    .cart-drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-lg);
      flex-shrink: 0;
    }
    .cart-drawer-header h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .cart-drawer-header .clear-btn {
      font-size: 13px;
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-primary);
      transition: color 0.15s ease;
    }
    .cart-drawer-header .clear-btn:hover {
      color: var(--red);
    }
    .cart-drawer-header .clear-btn:focus-visible {
      outline: 2px solid var(--heytea-green);
      outline-offset: 2px;
    }
    .cart-drawer-list {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-sm) var(--space-lg);
    }
    .cart-item {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md) 0;
      border-bottom: 1px solid var(--bg-tertiary);
    }
    .cart-item:last-child {
      border-bottom: none;
    }
    .cart-item-img {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--bg-tertiary);
    }
    .cart-item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .cart-item-info {
      flex: 1;
      min-width: 0;
    }
    .cart-item-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cart-item-spec {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: var(--space-xs);
    }
    .cart-item-price {
      font-family: var(--font-number);
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .cart-item-price .yen {
      font-size: 11px;
    }

    /* ========================================
       Toast
       ======================================== */
    .toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: var(--gray-900);
      color: var(--white);
      padding: 10px 24px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 500;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ========================================
       Animations
       ======================================== */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.5s ease forwards;
      opacity: 0;
    }
    .stagger-1 { animation-delay: 0.05s; }
    .stagger-2 { animation-delay: 0.1s; }
    .stagger-3 { animation-delay: 0.15s; }
    .stagger-4 { animation-delay: 0.2s; }
    .stagger-5 { animation-delay: 0.25s; }
    .stagger-6 { animation-delay: 0.3s; }

    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes cartBounce {
      0% { transform: scale(1); }
      30% { transform: scale(1.2); }
      50% { transform: scale(0.95); }
      70% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    .cart-bounce {
      animation: cartBounce 0.4s ease;
    }

    @keyframes flyToCart {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(var(--fly-x), var(--fly-y)) scale(0.3);
      }
    }
    .fly-ball {
      position: fixed;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--heytea-green);
      z-index: 300;
      pointer-events: none;
      animation: flyToCart 0.5s cubic-bezier(0.5, -0.3, 0.7, 0.3) forwards;
    }

    @keyframes badgePop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .badge-pop {
      animation: badgePop 0.3s ease;
    }

    /* ========================================
       Reduced Motion
       ======================================== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .reveal {
        opacity: 1;
        transform: none;
      }
    }

    /* ========================================
       Utility
       ======================================== */
    .hidden { display: none !important; }

    /* role="button" focus styles */
    [role="button"]:focus-visible {
      outline: 2px solid var(--heytea-green);
      outline-offset: 2px;
    }

    /* ========================================
       CHECKOUT PAGE
       ======================================== */

    .checkout-section {
      padding: var(--space-lg);
    }
    .checkout-section + .checkout-section {
      border-top: 8px solid var(--bg-secondary);
    }
    .checkout-section-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-md);
    }

    /* Store Info */
    .store-info {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md) 0;
    }
    .store-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--heytea-green-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .store-icon svg {
      width: 22px;
      height: 22px;
      color: var(--heytea-green);
    }
    .store-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .store-address {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* Order Items */
    .checkout-items {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }
    .checkout-item {
      display: flex;
      align-items: center;
      gap: var(--space-md);
    }
    .checkout-item-img {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--bg-tertiary);
    }
    .checkout-item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .checkout-item-info {
      flex: 1;
      min-width: 0;
    }
    .checkout-item-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .checkout-item-spec {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .checkout-item-right {
      text-align: right;
      flex-shrink: 0;
    }
    .checkout-item-qty {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .checkout-item-price {
      font-family: var(--font-number);
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }

    /* Price Summary */
    .price-summary {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }
    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .price-row.total {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      padding-top: var(--space-md);
      border-top: 1px solid var(--border-color);
      margin-top: var(--space-xs);
    }
    .price-row .value {
      font-family: var(--font-number);
      font-variant-numeric: tabular-nums;
    }
    .price-row.total .value {
      font-size: 20px;
      color: var(--heytea-green);
    }

    /* Payment Methods */
    .payment-methods {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }
    .payment-method {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md);
      background: var(--bg-secondary);
      border-radius: 12px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease;
      font-family: var(--font-primary);
      width: 100%;
      text-align: left;
    }
    .payment-method:hover {
      background: var(--bg-tertiary);
    }
    .payment-method.active {
      border-color: var(--heytea-green);
      background: var(--heytea-green-light);
    }
    .payment-method:focus-visible {
      outline: 2px solid var(--heytea-green);
      outline-offset: 2px;
    }
    .payment-method .pm-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .payment-method .pm-icon.wechat {
      background: #07C160;
      color: var(--white);
    }
    .payment-method .pm-icon.alipay {
      background: #1677FF;
      color: var(--white);
    }
    .payment-method .pm-icon.card {
      background: var(--gray-800);
      color: var(--white);
    }
    .payment-method .pm-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      flex: 1;
    }
    .payment-method .pm-check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--gray-300);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.2s ease, background 0.2s ease;
    }
    .payment-method.active .pm-check {
      border-color: var(--heytea-green);
      background: var(--heytea-green);
    }
    .payment-method.active .pm-check::after {
      content: '';
      width: 6px;
      height: 10px;
      border: solid var(--white);
      border-width: 0 2px 2px 0;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    /* Checkout Footer */
    .checkout-footer {
      position: sticky;
      bottom: 0;
      background: var(--white);
      padding: var(--space-md) var(--space-lg);
      padding-bottom: calc(var(--space-md) + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid var(--border-color);
    }
    .checkout-pay-btn {
      width: 100%;
      background: var(--heytea-green);
      color: var(--white);
      border: none;
      border-radius: 24px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
      font-family: var(--font-primary);
    }
    .checkout-pay-btn:hover {
      background: var(--heytea-green-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(var(--heytea-green-rgb), 0.3);
    }
    .checkout-pay-btn:active {
      transform: translateY(0);
    }
    .checkout-pay-btn:focus-visible {
      outline: 2px solid var(--heytea-green);
      outline-offset: 2px;
    }
    .checkout-pay-btn:disabled {
      background: var(--gray-300);
      color: var(--gray-500);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Success Overlay */
    .success-overlay {
      position: fixed;
      inset: 0;
      background: var(--white);
      z-index: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .success-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .success-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--heytea-green);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--space-xl);
      animation: successPop 0.5s cubic-bezier(0.32, 0.72, 0, 1) forwards;
      transform: scale(0);
    }
    .success-icon svg {
      width: 40px;
      height: 40px;
      color: var(--white);
    }
    @keyframes successPop {
      0% { transform: scale(0); }
      60% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    .success-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-sm);
      opacity: 0;
      animation: fadeInUp 0.4s ease 0.3s forwards;
    }
    .success-desc {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: var(--space-3xl);
      opacity: 0;
      animation: fadeInUp 0.4s ease 0.4s forwards;
    }
    .success-back-btn {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: none;
      border-radius: 24px;
      padding: 12px 40px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
      font-family: var(--font-primary);
      opacity: 0;
      animation: fadeInUp 0.4s ease 0.5s forwards;
    }
    .success-back-btn:hover {
      background: var(--bg-tertiary);
    }
    .success-back-btn:focus-visible {
      outline: 2px solid var(--heytea-green);
      outline-offset: 2px;
    }

    /* Remark Input */
    .remark-input {
      width: 100%;
      padding: var(--space-md);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      font-size: 14px;
      font-family: var(--font-primary);
      color: var(--text-primary);
      background: var(--bg-secondary);
      resize: none;
      outline: none;
      transition: border-color 0.2s ease;
      min-height: 60px;
    }
    .remark-input::placeholder {
      color: var(--text-tertiary);
    }
    .remark-input:focus {
      border-color: var(--heytea-green);
    }

    /* ========================================
       Skip Link
       ======================================== */
    .skip-link {
      position: absolute;
      top: -100%;
      left: var(--space-lg);
      background: var(--heytea-green);
      color: var(--white);
      padding: var(--space-sm) var(--space-lg);
      border-radius: 0 0 var(--space-md) var(--space-md);
      font-size: 14px;
      font-weight: 600;
      z-index: 9999;
      transition: top 0.2s ease;
    }
    .skip-link:focus {
      top: 0;
    }

    /* ========================================
       MEMBER PAGE
       ======================================== */

    /* Member Header Gradient */
    .member-header {
      background: linear-gradient(160deg, #E8F8EF 0%, #D4F0E0 40%, #C8E8D4 100%);
      padding: var(--space-3xl) var(--space-lg) var(--space-2xl);
      position: relative;
      overflow: hidden;
    }
    .member-header::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -40px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(var(--heytea-green-rgb), 0.08);
    }
    .member-header::after {
      content: '';
      position: absolute;
      bottom: -30px;
      left: -20px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(var(--heytea-green-rgb), 0.06);
    }

    /* Member Card */
    .member-card {
      background: linear-gradient(135deg, var(--heytea-green) 0%, #008C44 100%);
      border-radius: 16px;
      padding: var(--space-xl) var(--space-lg);
      color: var(--white);
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(var(--heytea-green-rgb), 0.25);
    }
    .member-card.black {
      background: linear-gradient(135deg, #1a1a1a 0%, #333333 50%, #1a1a1a 100%);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    .member-card .card-brand {
      font-size: 48px;
      font-weight: 700;
      position: absolute;
      right: var(--space-lg);
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.12;
      line-height: 1;
      font-family: 'Noto Serif SC', serif;
    }
    .member-card.black .card-brand {
      opacity: 0.08;
      background: linear-gradient(135deg, var(--gold), #FFA500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .member-card .card-level {
      font-size: 12px;
      font-weight: 500;
      opacity: 0.8;
      margin-bottom: var(--space-xs);
      letter-spacing: 0.05em;
    }
    .member-card .card-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: var(--space-lg);
    }
    .member-card .card-stats {
      display: flex;
      gap: var(--space-xl);
    }
    .member-card .stat-item {
      text-align: left;
    }
    .member-card .stat-value {
      font-family: var(--font-number);
      font-size: 22px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .member-card .stat-label {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 2px;
    }

    /* Growth Progress */
    .growth-section {
      padding: var(--space-lg);
    }
    .growth-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-md);
    }
    .growth-header .label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .growth-header .value {
      font-size: 13px;
      color: var(--text-secondary);
    }
    .growth-bar {
      height: 8px;
      background: var(--gray-200);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }
    .growth-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--heytea-green), #00C853);
      border-radius: 4px;
      transition: width 1s cubic-bezier(0.32, 0.72, 0, 1);
      position: relative;
    }
    .growth-bar-fill::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      width: 20px;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4));
      border-radius: 0 4px 4px 0;
    }
    .growth-levels {
      display: flex;
      justify-content: space-between;
      margin-top: var(--space-sm);
    }
    .growth-levels span {
      font-size: 11px;
      color: var(--text-tertiary);
    }
    .growth-levels span.current {
      color: var(--heytea-green);
      font-weight: 600;
    }

    /* Quick Actions */
    .quick-actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-sm);
      padding: 0 var(--space-lg);
      margin-bottom: var(--space-xl);
    }
    .quick-action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-lg) var(--space-sm);
      background: var(--white);
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
      font-family: var(--font-primary);
    }
    .quick-action-btn:hover {
      background: var(--bg-secondary);
      transform: translateY(-1px);
    }
    .quick-action-btn:active {
      transform: translateY(0);
    }
    .quick-action-btn:focus-visible {
      outline: 2px solid var(--heytea-green);
      outline-offset: 2px;
    }
    .quick-action-btn .icon-circle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .quick-action-btn .icon-circle.green {
      background: var(--heytea-green-light);
      color: var(--heytea-green);
    }
    .quick-action-btn .icon-circle.orange {
      background: rgba(var(--orange-rgb), 0.1);
      color: var(--orange);
    }
    .quick-action-btn .icon-circle.red {
      background: rgba(var(--red-rgb), 0.1);
      color: var(--red);
    }
    .quick-action-btn .icon-circle.gold {
      background: rgba(var(--gold-rgb), 0.12);
      color: #DAA520;
    }
    .quick-action-btn .action-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
    }

    /* Section Block */
    .member-section {
      padding: 0 var(--space-lg);
      margin-bottom: var(--space-xl);
    }
    .member-section-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-md);
      text-wrap: balance;
    }

    /* Coupon Cards */
    .coupon-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }
    .coupon-card {
      display: flex;
      background: var(--white);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .coupon-card:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    .coupon-card .coupon-left {
      width: 100px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-md);
      background: linear-gradient(135deg, var(--heytea-green-light), #D4F0E0);
      position: relative;
    }
    .coupon-card .coupon-left::after {
      content: '';
      position: absolute;
      right: 0;
      top: 12px;
      bottom: 12px;
      width: 1px;
      border-left: 1px dashed var(--gray-300);
    }
    .coupon-card .coupon-amount {
      font-family: var(--font-number);
      font-size: 28px;
      font-weight: 700;
      color: var(--heytea-green);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .coupon-card .coupon-amount .yen {
      font-size: 14px;
      font-weight: 600;
    }
    .coupon-card .coupon-condition {
      font-size: 10px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .coupon-card .coupon-right {
      flex: 1;
      padding: var(--space-md) var(--space-lg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }
    .coupon-card .coupon-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .coupon-card .coupon-desc {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: var(--space-sm);
    }
    .coupon-card .coupon-expire {
      font-size: 10px;
      color: var(--text-tertiary);
    }
    .coupon-card .coupon-use-btn {
      align-self: flex-end;
      background: var(--heytea-green);
      color: var(--white);
      border: none;
      border-radius: 14px;
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
      font-family: var(--font-primary);
      flex-shrink: 0;
    }
    .coupon-card .coupon-use-btn:hover {
      background: var(--heytea-green-dark);
    }
    .coupon-card .coupon-use-btn:focus-visible {
      outline: 2px solid var(--heytea-green);
      outline-offset: 2px;
    }
    .coupon-card .coupon-use-btn:disabled {
      background: var(--gray-300);
      color: var(--gray-500);
      cursor: not-allowed;
    }

    /* Benefits Grid */
    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-md);
    }
    .benefit-card {
      background: var(--white);
      border-radius: 12px;
      padding: var(--space-lg);
      text-align: center;
      box-shadow: var(--shadow-sm);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: default;
    }
    .benefit-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .benefit-card .benefit-icon {
      font-size: 28px;
      margin-bottom: var(--space-sm);
    }
    .benefit-card .benefit-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .benefit-card .benefit-desc {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    /* Points Shop */
    .points-shop-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-md);
    }
    .points-item {
      background: var(--white);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }
    .points-item:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .points-item .item-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: var(--bg-tertiary);
    }
    .points-item .item-info {
      padding: var(--space-sm) var(--space-sm) var(--space-md);
    }
    .points-item .item-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .points-item .item-points {
      font-family: var(--font-number);
      font-size: 14px;
      font-weight: 700;
      color: var(--orange);
      font-variant-numeric: tabular-nums;
    }
    .points-item .item-points .pts {
      font-size: 11px;
      font-weight: 500;
    }

    /* Member Tab Switch */
    .member-tabs {
      display: flex;
      background: var(--bg-secondary);
      border-radius: 10px;
      padding: 3px;
      margin: 0 var(--space-lg) var(--space-lg);
    }
    .member-tab {
      flex: 1;
      padding: 8px 0;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      background: none;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
      font-family: var(--font-primary);
    }
    .member-tab:hover {
      color: var(--text-primary);
    }
    .member-tab.active {
      background: var(--white);
      color: var(--text-primary);
      font-weight: 600;
      box-shadow: var(--shadow-sm);
    }
    .member-tab:focus-visible {
      outline: 2px solid var(--heytea-green);
      outline-offset: -2px;
    }
    .member-tab-content {
      display: none;
    }
    .member-tab-content.active {
      display: block;
      animation: fadeInUp 0.3s ease forwards;
    }

    /* Sign-in Banner */
    .sign-in-banner {
      margin: 0 var(--space-lg) var(--space-lg);
      background: linear-gradient(135deg, var(--heytea-green-light), #D4F0E0);
      border-radius: 12px;
      padding: var(--space-md) var(--space-lg);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sign-in-banner .sign-text {
      font-size: 14px;
      font-weight: 600;
      color: var(--heytea-green-dark);
    }
    .sign-in-banner .sign-btn {
      background: var(--heytea-green);
      color: var(--white);
      border: none;
      border-radius: 16px;
      padding: 6px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
      font-family: var(--font-primary);
    }
    .sign-in-banner .sign-btn:hover {
      background: var(--heytea-green-dark);
    }
    .sign-in-banner .sign-btn:disabled {
      background: var(--gray-300);
      color: var(--gray-500);
      cursor: not-allowed;
    }
    .sign-in-banner .sign-btn:focus-visible {
      outline: 2px solid var(--heytea-green);
      outline-offset: 2px;
    }

    /* Navbar avatar button */
    .navbar .avatar-btn {
      position: absolute;
      right: var(--space-md);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--bg-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
      color: var(--text-primary);
      padding: 0;
    }
    .navbar .avatar-btn:hover {
      background: var(--bg-tertiary);
    }
    .navbar .avatar-btn:focus-visible {
      outline: 2px solid var(--heytea-green);
      outline-offset: 2px;
    }
    .navbar .avatar-btn svg {
      width: 20px;
      height: 20px;
    }
  </style>
</head>

  // ========================================
  // NAVIGATION
  // ========================================
  function navigateTo(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(`page-${page}`).classList.add('active');
    currentPage = page;
    window.scrollTo({ top: 0, behavior: 'smooth' });

    if (page === 'order') {
      renderCategoryNav();
      renderProductGrid();
    }

    if (page === 'member') {
      initMemberPage();
    }

    if (page === 'checkout' || page === 'member') {
      // Hide cart bar and cart drawer on checkout/member page
      document.getElementById('cartBar').style.display = 'none';
      document.getElementById('cartDrawer').style.display = 'none';
      document.getElementById('cartDrawerOverlay').style.display = 'none';
    } else {
      document.getElementById('cartBar').style.display = '';
      // Restore cart drawer visibility (but keep it closed)
      document.getElementById('cartDrawer').style.display = '';
      document.getElementById('cartDrawerOverlay').style.display = '';
    }
  }

  // ========================================
  // BANNER CAROUSEL
  // ========================================
  function initBanner() {
    const track = document.getElementById('bannerTrack');
    const dots = document.querySelectorAll('.banner-dot');

    function goTo(index) {
      bannerIndex = index;
      track.style.transform = `translateX(-${index * (100 / 3)}%)`;
      dots.forEach((d, i) => d.classList.toggle('active', i === index));
    }

    dots.forEach(dot => {
      dot.addEventListener('click', () => {
        goTo(parseInt(dot.dataset.index));
        resetBannerTimer();
      });
    });

    function nextSlide() {
      goTo((bannerIndex + 1) % 3);
    }

    function resetBannerTimer() {
      clearInterval(bannerTimer);
      bannerTimer = setInterval(nextSlide, 4000);
    }

    resetBannerTimer();
  }

  function getFilteredProducts() {
    if (currentCategory === 'recommend') return PRODUCTS;
    if (currentCategory === 'new') return PRODUCTS.filter(p => p.tags.includes('new'));
    if (currentCategory === 'season') return PRODUCTS.filter(p => p.tags.includes('season'));
    return PRODUCTS.filter(p => p.category === currentCategory);
  }

  function renderProductGrid() {
    const grid = document.getElementById('productGrid');
    const items = getFilteredProducts();

    if (items.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--text-tertiary);font-size:14px;">暂无该分类商品</div>';
      return;

    grid.innerHTML = items.map((p, i) => {
      const cartItem = cart.find(c => c.id === p.id);

      const tagsHtml = p.tags.map(t => {
        if (t === 'hot') return '<span class="tag tag-hot">人气</span>';
        if (t === 'new') return '<span class="tag tag-new">新品</span>';
        if (t === 'season') return '<span class="tag tag-season">限定</span>';
        return '';
      }).join('');

      return `
        <div class="product-card animate-fade-in-up stagger-${Math.min(i % 6 + 1, 6)}" role="button" tabindex="0" onclick="openProductModal(${p.id})" onkeydown="if(event.key==='Enter')openProductModal(${p.id})">

  // ========================================
  // PRODUCT MODAL
  // ========================================
  function openProductModal(id) {
    const product = PRODUCTS.find(p => p.id === id);
    if (!product) return;

    selectedProduct = product;
    selectedSpecs = { size: '中杯', sugar: '五分糖', ice: '正常冰', toppings: [] };

    document.getElementById('modalImg').src = product.img;
    document.getElementById('modalImg').alt = product.name;
    document.getElementById('modalName').textContent = product.name;
    document.getElementById('modalDesc').textContent = product.desc;
    document.getElementById('modalPrice').textContent = product.price;

    // Reset spec selections
    document.querySelectorAll('#specSize .spec-option').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.value === '中杯');
    });
    document.querySelectorAll('#specSugar .spec-option').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.value === '五分糖');
    });
    document.querySelectorAll('#specIce .spec-option').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.value === '正常冰');
    });
    document.querySelectorAll('#specToppings .spec-option').forEach(btn => {
      btn.classList.remove('active');
    });

    updateModalPrice();

    const modal = document.getElementById('productModal');
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeProductModal() {
    const modal = document.getElementById('productModal');
    modal.classList.remove('open');
    document.body.style.overflow = '';
    selectedProduct = null;
  }

  function selectSpec(btn, group) {
    btn.parentElement.querySelectorAll('.spec-option').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedSpecs[group] = btn.dataset.value;
    updateModalPrice();
  }

  function toggleTopping(btn) {
    btn.classList.toggle('active');
    const value = btn.dataset.value;
    if (selectedSpecs.toppings.includes(value)) {
      selectedSpecs.toppings = selectedSpecs.toppings.filter(t => t !== value);
    } else {
      selectedSpecs.toppings.push(value);
    }
    updateModalPrice();
  }

  function updateModalPrice() {
    if (!selectedProduct) return;
    let total = selectedProduct.price;

    // Size extra
    const sizeBtn = document.querySelector('#specSize .spec-option.active');
    if (sizeBtn && sizeBtn.dataset.extra) {
      total += parseInt(sizeBtn.dataset.extra);
    }

    // Toppings extra
    document.querySelectorAll('#specToppings .spec-option.active').forEach(btn => {
      if (btn.dataset.extra) total += parseInt(btn.dataset.extra);
    });

    document.getElementById('modalTotalPrice').textContent = total;
  }

  function addToCartFromModal() {
    if (!selectedProduct) return;

    let totalPrice = selectedProduct.price;
    const sizeBtn = document.querySelector('#specSize .spec-option.active');
    const sizeLabel = sizeBtn ? sizeBtn.dataset.value : '中杯';
    if (sizeBtn && sizeBtn.dataset.extra) totalPrice += parseInt(sizeBtn.dataset.extra);

    const toppingLabels = [];
    document.querySelectorAll('#specToppings .spec-option.active').forEach(btn => {
      toppingLabels.push(btn.dataset.value);
      if (btn.dataset.extra) totalPrice += parseInt(btn.dataset.extra);
    });

    const specText = `${sizeLabel} / ${selectedSpecs.sugar} / ${selectedSpecs.ice}${toppingLabels.length ? ' / ' + toppingLabels.join('+') : ''}`;

    const existing = cart.find(c => c.id === selectedProduct.id && c.spec === specText);
    if (existing) {
      existing.qty++;
    } else {
      cart.push({
        id: selectedProduct.id,
        name: selectedProduct.name,
        price: totalPrice,
        spec: specText,
        qty: 1,
        img: selectedProduct.img
      });
    }

    updateCartUI();
    closeProductModal();
    showToast('已加入购物车');

    // Bounce cart icon
    const iconWrap = document.getElementById('cartIconWrap');
    iconWrap.classList.remove('cart-bounce');
    void iconWrap.offsetWidth;
    iconWrap.classList.add('cart-bounce');
  }

  // Close modal on overlay click
  document.getElementById('productModal').addEventListener('click', function(e) {
    if (e.target === this) closeProductModal();
  });

  // ========================================
  // CART
  // ========================================
  function quickAdd(id, btnEl) {
    const product = PRODUCTS.find(p => p.id === id);
    if (!product) return;

    const specText = '中杯 / 五分糖 / 正常冰';
    const existing = cart.find(c => c.id === id && c.spec === specText);
    if (existing) {
      existing.qty++;
    } else {
      cart.push({
        id: id,
        name: product.name,
        price: product.price,
        spec: specText,
        qty: 1,
        img: product.img
      });
    }

    updateCartUI();
    showToast('已加入购物车');

    // Fly animation
    if (btnEl) {
      flyToCart(btnEl);
    }

    // Bounce
    const iconWrap = document.getElementById('cartIconWrap');
    iconWrap.classList.remove('cart-bounce');
    void iconWrap.offsetWidth;
    iconWrap.classList.add('cart-bounce');

    // Re-render product grid if on order page
    if (currentPage === 'order') {
      renderProductGrid();
    }
  }

  function changeQty(id, delta, btnEl) {
    const item = cart.find(c => c.id === id);
    if (!item) return;

    item.qty += delta;
    if (item.qty <= 0) {
      cart = cart.filter(c => c.id !== id || c.qty > 0);
    }

    updateCartUI();
    if (currentPage === 'order') renderProductGrid();
    renderCartDrawer();
  }

  function updateCartUI() {
    const totalQty = cart.reduce((sum, c) => sum + c.qty, 0);
    const totalPrice = cart.reduce((sum, c) => sum + c.price * c.qty, 0);

    const badge = document.getElementById('cartBadge');
    const iconWrap = document.getElementById('cartIconWrap');
    const priceEl = document.getElementById('cartTotalPrice');
    const checkoutBtn = document.getElementById('checkoutBtn');

    if (totalQty > 0) {
      badge.classList.remove('hidden');
      badge.textContent = totalQty > 99 ? '99+' : totalQty;
      iconWrap.classList.add('has-items');
      checkoutBtn.disabled = false;
    } else {
      badge.classList.add('hidden');
      iconWrap.classList.remove('has-items');
      checkoutBtn.disabled = true;
    }

    priceEl.textContent = totalPrice;

    // Badge pop
    badge.classList.remove('badge-pop');
    void badge.offsetWidth;
    badge.classList.add('badge-pop');
  }

  function toggleCartDrawer() {
    const overlay = document.getElementById('cartDrawerOverlay');
    const drawer = document.getElementById('cartDrawer');
    const isOpen = drawer.classList.contains('open');

    if (isOpen) {
      overlay.classList.remove('open');
      drawer.classList.remove('open');
      document.body.style.overflow = '';
    } else {
      renderCartDrawer();
      overlay.classList.add('open');
      drawer.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
  }

  function renderCartDrawer() {
    const list = document.getElementById('cartDrawerList');

    if (cart.length === 0) {
      list.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--text-tertiary);font-size:14px;">购物车是空的</div>';
      return;

    list.innerHTML = cart.map(item => `

          <img src="${item.img}" alt="${item.name}" loading="lazy">
        </div>

          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-spec">${item.spec}</div>
          <div class="cart-item-price"><span class="yen">&yen;</span>${item.price}</div>
        </div>
        <div class="qty-control">
          <button class="btn-icon minus" onclick="changeQty(${item.id}, -1, this)" aria-label="减少 ${item.name} 数量">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
          <span class="qty-num">${item.qty}</span>
          <button class="btn-icon add" onclick="changeQty(${item.id}, 1, this)" aria-label="增加 ${item.name} 数量">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
      </div>
    `).join('');

  let clearConfirmTimer = null;
  function clearCart() {
    if (cart.length === 0) {
      toggleCartDrawer();
      return;
    }
    const btn = document.querySelector('.clear-btn');
    if (btn.dataset.confirming === 'true') {
      // 第二次点击，执行清空
      clearTimeout(clearConfirmTimer);
      btn.dataset.confirming = 'false';
      btn.textContent = '清空';
      cart = [];
      updateCartUI();
      renderCartDrawer();
      if (currentPage === 'order') renderProductGrid();
      toggleCartDrawer();
      showToast('购物车已清空');
    } else {
      // 第一次点击，进入确认状态
      btn.dataset.confirming = 'true';
      btn.textContent = '确认清空？';
      clearConfirmTimer = setTimeout(() => {
        btn.dataset.confirming = 'false';
        btn.textContent = '清空';
      }, 2000);
    }
  }

    if (cart.length === 0) return;

    const drawer = document.getElementById('cartDrawer');
    const overlay = document.getElementById('cartDrawerOverlay');

    drawer.style.display = 'none';

    document.body.style.overflow = '';

    navigateTo('checkout');

  // ========================================
  // FLY TO CART ANIMATION
  // ========================================
  function flyToCart(btnEl) {
    const btnRect = btnEl.getBoundingClientRect();
    const cartIcon = document.getElementById('cartIconWrap');
    const cartRect = cartIcon.getBoundingClientRect();

    const startX = btnRect.left + btnRect.width / 2;
    const startY = btnRect.top + btnRect.height / 2;
    const endX = cartRect.left + cartRect.width / 2 - startX;
    const endY = cartRect.top + cartRect.height / 2 - startY;

    const ball = document.createElement('div');
    ball.className = 'fly-ball';
    ball.style.left = startX + 'px';
    ball.style.top = startY + 'px';
    ball.style.setProperty('--fly-x', endX + 'px');
    ball.style.setProperty('--fly-y', endY + 'px');
    document.body.appendChild(ball);

    setTimeout(() => ball.remove(), 500);
  }

  // ========================================
  // SCROLL REVEAL (IntersectionObserver)
  // ========================================
  function initScrollReveal() {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  }

    { id: 3, name: '买一赠一券', desc: '指定款饮品可用', amount: 0, condition: '指定款', expire: '2026.05.15', used: false },
    { id: 4, name: '新品8折券', desc: '新品上市专属折扣', amount: 0, condition: '新品可用', expire: '2026.04.25', used: true },
    { id: 5, name: '下午茶套餐券', desc: '14:00-17:00可用', amount: 15, condition: '满80可用', expire: '2026.06.01', used: false },
  ];

  const POINTS_ITEMS = [
    { id: 1, name: '喜茶限定杯垫', points: 500, img: 'https://images.unsplash.com/photo-1514228742587-6b1558fcca3d?w=300&h=300&fit=crop' },
    { id: 2, name: '多肉葡萄贴纸', points: 200, img: 'https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=300&h=300&fit=crop' },
    { id: 3, name: '喜茶帆布袋', points: 1200, img: 'https://images.unsplash.com/photo-1597633425046-08f5110420b5?w=300&h=300&fit=crop' },
    { id: 4, name: '芝芝莓莓徽章', points: 300, img: 'https://images.unsplash.com/photo-1578662996442-48f60103fc96?w=300&h=300&fit=crop' },
    { id: 5, name: '生椰拿铁杯套', points: 400, img: 'https://images.unsplash.com/photo-1511920170033-f8396924c348?w=300&h=300&fit=crop' },
    { id: 6, name: '会员专属徽章', points: 800, img: 'https://images.unsplash.com/photo-1558655146-9f40138edfeb?w=300&h=300&fit=crop' },
  ];

  let memberPoints = 2680;
  let signedIn = false;
  let signStreak = 3;

  // ========================================
  // MEMBER RENDERING
  // ========================================
  function renderBenefits() {
    const grid = document.getElementById('benefitsGrid');
    grid.innerHTML = BENEFITS.map(b => `
      <div class="benefit-card">
        <div class="benefit-icon">${b.icon}</div>
        <div class="benefit-name">${b.name}</div>
        <div class="benefit-desc">${b.desc}</div>
      </div>
    `).join('');
  }

  function renderCoupons() {
    const list = document.getElementById('couponList');
    list.innerHTML = COUPONS.map(c => `
      <div class="coupon-card ${c.used ? 'used' : ''}">
        <div class="coupon-left">
          ${c.amount > 0
            ? `<div class="coupon-amount"><span class="yen">&yen;</span>${c.amount}</div>`
            : `<div class="coupon-amount" style="font-size:16px;">赠</div>`
          }
          <div class="coupon-condition">${c.condition}</div>
        </div>
        <div class="coupon-right">
          <div class="coupon-name">${c.name}</div>
          <div class="coupon-desc">${c.desc}</div>
          <div class="coupon-expire">有效期至 ${c.expire}</div>
        </div>
      </div>
    `).join('');
  }

  function renderPointsShop() {
    const grid = document.getElementById('pointsGrid');
    grid.innerHTML = POINTS_ITEMS.map(item => `
      <div class="points-item" role="button" tabindex="0" onclick="handlePointsExchange(${item.id})" onkeydown="if(event.key==='Enter')handlePointsExchange(${item.id})">
        <img class="item-img" src="${item.img}" alt="${item.name}" width="300" height="300" loading="lazy">
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-points"><span class="pts">积分</span> ${item.points}</div>
        </div>
      </div>
    `).join('');
  }

  // ========================================
  // MEMBER INTERACTIONS
  // ========================================
  function switchMemberTab(tab) {
    document.querySelectorAll('.member-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.querySelectorAll('.member-tab-content').forEach(c => c.classList.toggle('active', c.id === `tab-${tab}`));
  }

  function handleSignIn() {
    if (signedIn) {
      showToast('今日已签到');
      return;
    }
    signedIn = true;
    signStreak++;
    memberPoints += 10;

    document.getElementById('signBtn').disabled = true;
    document.getElementById('signBtn').textContent = '已签到';
    document.getElementById('signStreak').textContent = signStreak;
    document.getElementById('statPoints').textContent = memberPoints.toLocaleString();

    showToast('签到成功，积分 +10');
  }

  function handlePointsExchange(id) {
    const item = POINTS_ITEMS.find(i => i.id === id);
    if (!item) return;

    if (memberPoints < item.points) {
      showToast('积分不足，还差 ' + (item.points - memberPoints) + ' 积分');
      return;
    }

    memberPoints -= item.points;
    document.getElementById('statPoints').textContent = memberPoints.toLocaleString();
    showToast('兑换成功：' + item.name);
  }

  function initMemberPage() {
    renderBenefits();
    renderCoupons();
    renderPointsShop();

    // Animate growth bar
    setTimeout(() => {
      document.getElementById('growthBarFill').style.width = '68%';
    }, 300);
  }

  // ========================================
  // INIT
  // ========================================
  function init() {
    initBanner();
    renderHotProducts();
    renderNewArrivals();
    initScrollReveal();
    initMemberPage();
  }

  document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
